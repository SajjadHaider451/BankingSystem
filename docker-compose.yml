
services:
  db:
    image: mysql:8.0
    container_name: banking-db
    environment:
      MYSQL_DATABASE: BankingSystem
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
  app:
    build: .
    container_name: banking-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy
